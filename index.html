<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Simple Rogue-like v2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0a0a12; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }
        canvas {
            display: block;
            border: 2px solid #333;
            border-radius: 4px;
        }
        
        /* Virtual Joystick - Mobile only */
        #joystick-zone {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 120px;
            height: 120px;
            z-index: 100;
        }
        #joystick-base {
            position: absolute;
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.1);
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
        }
        #joystick-knob {
            position: absolute;
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.5);
            border: 2px solid rgba(255,255,255,0.8);
            border-radius: 50%;
            left: 35px;
            top: 35px;
        }
        
        #btn-attack {
            position: fixed;
            bottom: 50px;
            right: 30px;
            width: 80px;
            height: 80px;
            background: rgba(255,100,100,0.3);
            border: 3px solid rgba(255,150,150,0.6);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 32px;
            z-index: 100;
        }
        #btn-attack:active {
            background: rgba(255,100,100,0.6);
        }
        
        @media (min-width: 800px) {
            #joystick-zone, #btn-attack { display: none !important; }
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    
    <!-- Joystick -->
    <div id="joystick-zone">
        <div id="joystick-base"></div>
        <div id="joystick-knob"></div>
    </div>
    
    <!-- Attack -->
    <div id="btn-attack">⚔</div>

    <script>
    const TILE_SIZE = 20;
    const GRID_WIDTH = 24;
    const GRID_HEIGHT = 20;
    const MAX_FLOORS = 5;

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = GRID_WIDTH * TILE_SIZE;
    canvas.height = GRID_HEIGHT * TILE_SIZE;

    // Colors
    const C = {
        WALL: '#2a2a3a',
        FLOOR: '#1a1a25',
        PLAYER: '#4ade80',
        SLIME: '#60a5fa',
        SKELETON: '#d4d4d8',
        ORC: '#84cc16',
        HEALTH: '#f472b6',
        STAIRS: '#fbbf24'
    };

    let game = { floor: 1, state: 'PLAYING', map: [], player: null, enemies: [], items: [], stairs: null };
    let joystick = { active: false, dx: 0, dy: 0, interval: null };

    function generateDungeon(floor) {
        game.map = []; game.enemies = []; game.items = [];
        for (let y = 0; y < GRID_HEIGHT; y++) {
            game.map[y] = [];
            for (let x = 0; x < GRID_WIDTH; x++) {
                game.map[y][x] = (x===0 || x===GRID_WIDTH-1 || y===0 || y===GRID_HEIGHT-1) ? 'WALL' : 'FLOOR';
            }
        }
        
        game.player = { x: Math.floor(GRID_WIDTH/2), y: Math.floor(GRID_HEIGHT/2), hp: 100, maxHp: 100, attack: 12, defense: 5 };
        
        const types = [{t:'SLIME',s:15,c:C.SLIME,ai:'random',d:1}, {t:'SKELETON',s:25,c:C.SKELETON,ai:'chase',d:3}, {t:'ORC',s:40,c:C.ORC,ai:'smart',d:5}];
        for (let i = 0; i < 2+floor; i++) {
            let p = randPos();
            let type = types[Math.floor(Math.random()*types.length)];
            game.enemies.push({ x: p.x, y: p.y, type: type.t, hp: type.s+floor*5, maxHp: type.s+floor*5, attack: type.d+floor, defense: type.d, ai: type.ai, cd: 0 });
        }
        
        for (let i = 0; i < 1+Math.floor(floor/2); i++) game.items.push({x: randPos().x, y: randPos().y, type: 'HEALTH'});
        game.stairs = randPos();
    }

    function randPos() {
        let attempts = 0;
        while (attempts < 100) {
            let x = 2+Math.floor(Math.random()*(GRID_WIDTH-4));
            let y = 2+Math.floor(Math.random()*(GRID_HEIGHT-4));
            if (!occ(x,y)) return {x,y};
            attempts++;
        }
        return {x:3,y:3};
    }

    function occ(x,y) {
        if (game.player && x===game.player.x && y===game.player.y) return true;
        if (game.enemies.some(e=>e.x===x && e.y===y)) return true;
        if (game.items.some(i=>i.x===x && i.y===y)) return true;
        if (game.stairs && x===game.stairs.x && y===game.stairs.y) return true;
        return false;
    }

    function move(dx,dy) {
        if (game.state!=='PLAYING') return;
        let nx = game.player.x+dx, ny = game.player.y+dy;
        if (game.map[ny]?.[nx] === 'FLOOR') {
            game.player.x = nx; game.player.y = ny;
            updateEnemies();
            check();
            render();
        }
    }

    function updateEnemies() {
        game.enemies.forEach(e => {
            if (e.cd>0) { e.cd--; return; }
            let dx=0, dy=0;
            if (e.ai==='random') { dx = Math.random()>.5?1:-1; dy = Math.random()>.5?1:-1; }
            else if (e.ai==='chase') {
                if (Math.abs(game.player.x-e.x) > Math.abs(game.player.y-e.y)) dx = Math.sign(game.player.x-e.x);
                else dy = Math.sign(game.player.y-e.y);
            } else if (e.ai==='smart') {
                let dist = Math.abs(game.player.x-e.x)+Math.abs(game.player.y-e.y);
                if (dist<6) { dx = Math.sign(game.player.x-e.x); dy = Math.sign(game.player.y-e.y); }
                else if (Math.random()<.3) { dx=Math.random()>.5?1:-1; dy=Math.random()>.5?1:-1; }
            }
            if (game.map[e.y+dy]?.[e.x+dx] === 'FLOOR' && !occ(e.x+dx,e.y+dy)) { e.x+=dx; e.y+=dy; e.cd = e.ai==='smart'?1:2; }
        });
    }

    function attack() {
        if (game.state!=='PLAYING') return;
        [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx,dy]) => {
            game.enemies.forEach((e,i) => {
                if (e.x===game.player.x+dx && e.y===game.player.y+dy) {
                    e.hp -= Math.max(1, game.player.attack - e.defense);
                    if (e.hp<=0) game.enemies.splice(i,1);
                }
            });
        });
        render();
    }

    function check() {
        game.items = game.items.filter(i => !(i.x===game.player.x && i.y===game.player.y) || (game.player.hp=Math.min(game.player.hp+30,game.player.maxHp),false));
        if (game.stairs && game.player.x===game.stairs.x && game.player.y===game.stairs.y) { nextFloor(); return; }
        game.enemies = game.enemies.filter(e => !(e.x===game.player.x && e.y===game.player.y) || (game.player.hp-=Math.max(1,e.attack-game.player.defense),true));
        if (game.player.hp<=0) { game.state='LOST'; alert('GAME OVER\nFloor: '+game.floor+'\nTap to restart'); game.floor=1; startFloor(); }
        render();
    }

    function nextFloor() {
        if (game.floor>=MAX_FLOORS) { alert('YOU WIN!'); game.floor=1; }
        else game.floor++;
        startFloor();
    }

    function render() {
        ctx.fillStyle = C.FLOOR; ctx.fillRect(0,0,canvas.width,canvas.height);
        for (let y=0;y<GRID_HEIGHT;y++) for (let x=0;x<GRID_WIDTH;x++) {
            ctx.fillStyle = game.map[y][x]==='WALL' ? C.WALL : C.FLOOR;
            ctx.fillRect(x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE);
        }
        
        // Stairs - yellow with lines
        if (game.stairs) {
            ctx.fillStyle = C.STAIRS;
            ctx.fillRect(game.stairs.x*TILE_SIZE+2, game.stairs.y*TILE_SIZE+2, TILE_SIZE-4, TILE_SIZE-4);
            ctx.fillStyle = '#a16207';
            for (let i=0;i<3;i++) ctx.fillRect(game.stairs.x*TILE_SIZE+4, game.stairs.y*TILE_SIZE+4+i*5, TILE_SIZE-8, 2);
        }
        
        // Health items - pink hearts
        game.items.forEach(i => {
            ctx.fillStyle = C.HEALTH;
            ctx.beginPath();
            ctx.arc(i.x*TILE_SIZE+TILE_SIZE/2, i.y*TILE_SIZE+TILE_SIZE/2, 6, 0, Math.PI*2);
            ctx.fill();
        });
        
        // Enemies with simple shapes
        game.enemies.forEach(e => {
            ctx.fillStyle = e.type==='SLIME' ? C.SLIME : e.type==='SKELETON' ? C.SKELETON : C.ORC;
            ctx.fillRect(e.x*TILE_SIZE+2, e.y*TILE_SIZE+2, TILE_SIZE-4, TILE_SIZE-4);
            // Eyes
            ctx.fillStyle = '#000';
            ctx.fillRect(e.x*TILE_SIZE+5, e.y*TILE_SIZE+5, 3, 3);
            ctx.fillRect(e.x*TILE_SIZE+12, e.y*TILE_SIZE+5, 3, 3);
        });
        
        // Player - green with face
        ctx.fillStyle = C.PLAYER;
        ctx.fillRect(game.player.x*TILE_SIZE+2, game.player.y*TILE_SIZE+2, TILE_SIZE-4, TILE_SIZE-4);
        ctx.fillStyle = '#166534';
        ctx.fillRect(game.player.x*TILE_SIZE+5, game.player.y*TILE_SIZE+6, 3, 3);
        ctx.fillRect(game.player.x*TILE_SIZE+12, game.player.y*TILE_SIZE+6, 3, 3);
    }

    // Joystick
    const jz = document.getElementById('joystick-zone'), jk = document.getElementById('joystick-knob');
    function handleJoystick(e) {
        e.preventDefault();
        const t = e.touches ? e.touches[0] : e;
        const r = jz.getBoundingClientRect();
        let dx = t.clientX - r.left - 60, dy = t.clientY - r.top - 60;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d > 40) { dx = dx/d*40; dy = dy/d*40; }
        jk.style.transform = `translate(${dx}px, ${dy}px)`;
        joystick.dx = Math.abs(dx)>10 ? Math.sign(dx) : 0;
        joystick.dy = Math.abs(dy)>10 ? Math.sign(dy) : 0;
        if (!joystick.interval) joystick.interval = setInterval(() => { if (joystick.dx||joystick.dy) move(joystick.dx, joystick.dy); }, 150);
    }
    function resetJoystick() {
        jk.style.transform = 'translate(0,0)';
        joystick.dx = joystick.dy = 0;
        clearInterval(joystick.interval);
        joystick.interval = null;
    }
    jz.addEventListener('touchstart', handleJoystick);
    jz.addEventListener('touchmove', handleJoystick);
    jz.addEventListener('touchend', resetJoystick);

    // Attack button
    document.getElementById('btn-attack').addEventListener('touchstart', e => { e.preventDefault(); attack(); });
    document.getElementById('btn-attack').addEventListener('click', attack);

    // Keyboard
    document.addEventListener('keydown', e => {
        if (e.key==='w'||e.key==='ArrowUp') move(0,-1);
        else if (e.key==='s'||e.key==='ArrowDown') move(0,1);
        else if (e.key==='a'||e.key==='ArrowLeft') move(-1,0);
        else if (e.key==='d'||e.key==='ArrowRight') move(1,0);
        else if (e.key===' ') attack();
    });

    startFloor();
    function startFloor() { generateDungeon(game.floor); render(); }
    </script>
</body>
</html>
