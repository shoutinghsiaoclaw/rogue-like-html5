<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Simple Rogue-like</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0a0a12; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 640px;
            height: 100vh;
            max-height: 560px;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            text-shadow: 2px 2px 4px #000;
            z-index: 10;
            pointer-events: none;
        }
        #hp-bar-container {
            width: 150px;
            height: 16px;
            background: #222;
            border: 2px solid #444;
            border-radius: 8px;
            margin-top: 5px;
            overflow: hidden;
        }
        #hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ade80, #22c55e);
            transition: width 0.3s;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: grid;
            grid-template-columns: repeat(3, 70px);
            grid-template-rows: repeat(2, 70px);
            gap: 8px;
            z-index: 10;
        }
        .btn {
            width: 70px;
            height: 70px;
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 28px;
            user-select: none;
            -webkit-user-select: none;
            backdrop-filter: blur(4px);
        }
        .btn:active {
            background: rgba(255,255,255,0.35);
            transform: scale(0.95);
        }
        #message-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 20;
        }
        #message-text {
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 28px;
            text-align: center;
            line-height: 1.6;
            white-space: pre-line;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div>♥ HP: <span id="hp-text">100</span>/<span id="max-hp-text">100</span></div>
            <div id="hp-bar-container"><div id="hp-fill"></div></div>
            <div style="margin-top:10px">🏆 Floor: <span id="floor-text">1</span>/5</div>
        </div>
        
        <div id="controls">
            <div></div>
            <div class="btn" id="btn-up">▲</div>
            <div></div>
            <div class="btn" id="btn-left">◀</div>
            <div class="btn" id="btn-attack">⚔</div>
            <div class="btn" id="btn-right">▶</div>
            <div></div>
            <div class="btn" id="btn-down">▼</div>
            <div></div>
        </div>

        <div id="message-overlay">
            <div id="message-text"></div>
        </div>
    </div>

    <script type="module">
        import { Game } from './src/game/game.js';
        
        const game = new Game();
        window.onload = () => game.init();
    </script>
</body>
</html>
